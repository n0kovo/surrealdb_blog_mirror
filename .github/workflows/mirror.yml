name: Mirror SurrealDB blog

on:
  schedule:
  - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      refresh:
        description: "Re-download existing posts"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - run: pip install -r .github/workflows/requirements.txt

    - name: Run mirror
      run: |
        python .github/workflows/fetchposts.py --all \
          ${{ inputs.refresh && '--refresh' || '' }}

    - name: Commit changes
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A ':!.github' ':!.gitignore'
        if git diff --cached --quiet; then
          echo "No changes."
          exit 0
        fi
        NEW=$(git diff --cached --name-only --diff-filter=A -- '**/*.md' | wc -l | tr -d ' ')
        MOD=$(git diff --cached --name-only --diff-filter=M -- '**/*.md' | wc -l | tr -d ' ')
        git commit -m "mirror: ${NEW} new, ${MOD} updated ($(date -u +%Y-%m-%d))"
        git push
